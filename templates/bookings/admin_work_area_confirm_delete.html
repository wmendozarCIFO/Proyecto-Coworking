{% extends 'base.html' %}

{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h2>Confirmar Eliminación</h2>
    
    <div class="card p-4 mt-3 text-center">
        <p>¿Estás seguro de que deseas eliminar permanentemente el área de trabajo <strong>"{{ area.name }}"</strong>?</p>
        <p class="text-muted mb-4"><small>Esta acción no se puede deshacer.</small></p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'admin_work_areas' %}" class="btn btn-secondary" style="margin-right: 1rem;">Cancelar</a>
                <button type="submit" class="btn btn-danger" style="background-color: var(--danger); border: none; padding: 0.5rem 1rem; color: white; border-radius: 4px;">Sí, Eliminar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
