{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4 text-center">Selecciona una Fecha</h1>

<div class="calendar-grid">
    {% for date in dates %}
    <a href="{% url 'booking_slots' date|date:'Y-m-d' %}" class="calendar-day"
        style="text-decoration: none; color: inherit; transition: all 0.2s;">
        <div class="calendar-day-header">{{ date|date:"l" }}</div>
        <div style="font-size: 1.5rem; font-weight: 300;">{{ date.day }}</div>
        <div style="font-size: 0.9rem; color: var(--text-muted);">{{ date|date:"F Y" }}</div>
        <div style="margin-top: auto; color: var(--primary); font-size: 0.8rem; font-weight: 600;">Ver Horarios &rarr;
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
